                    document.getElementById('page_title').innerText = "Student Profile";
                    document.getElementById('avatar_upload_label').style.display = 'none'; // කැමරා බටන් එක අයින් කරනවා
                    document.getElementById('save_btn_container').style.display = 'none'; // සේව් බටන් එක අයින් කරනවා
                    
                    // Inputs disable කිරීම (වෙනස් කිරීමට නොහැකි වන සේ)
                    document.getElementById('name').disabled = true;
                    document.getElementById('first_name').disabled = true;
                    document.getElementById('last_name').disabled = true;
                    document.getElementById('telegram_username_id').disabled = true;
                    document.getElementById('id_exam_year').disabled = true;
                }

                // UID එක UI එකට දැමීම
                document.getElementById('display_uid').innerHTML = `<i class="fa-solid fa-id-card-clip me-1"></i> UID: ${targetUid}`;

                // 1. Target UID එකට අදාළව Firestore Database එකෙන් දත්ත කියවීම
                const userDocRef = doc(db, "students", targetUid);
                const userDocSnap = await getDoc(userDocRef);

                if (userDocSnap.exists()) {
                    const data = userDocSnap.data();
                    
                    // Firestore එකේ තියෙන දත්ත Inputs වලට පිරවීම
                    document.getElementById('name').value = data.fullName || "";
                    document.getElementById('display_full_name').innerText = data.fullName || "Nexus User";
                    document.getElementById('email').value = data.email || "No Email Provided";
                    document.getElementById('first_name').value = data.firstName || "";
                    document.getElementById('last_name').value = data.lastName || "";
                    document.getElementById('telegram_username_id').value = data.telegram || "";
                    document.getElementById('id_exam_year').value = data.examYear || "2027";
                    
                    if(data.avatar) {
                        document.getElementById('avatar_img').src = data.avatar;
                    }
                } else {
                    // Firestore එකේ නැත්නම් සහ තමන්ගේම නම් Auth account එකෙන් නම ගන්නවා
                    if (targetUid === user.uid) {
                        document.getElementById('name').value = user.displayName || "";
                        document.getElementById('display_full_name').innerText = user.displayName || "Nexus User";
                        document.getElementById('email').value = user.email;
                    } else {
                        document.getElementById('display_full_name').innerText = "Unknown User";
                        document.getElementById('name').value = "Unknown User";
                    }
                }

            } else {
                // ලොග් වෙලා නැත්නම් Auth පිටුවට හරවා යැවීම
                window.location.href = 'index.html';
            }
        });

        // 💾 Data Save කරන ප්‍රධාන Function එක (තමන්ගේ profile එක නම් පමණි)
        window.saveStudentInfo = async function(event) {
            event.preventDefault();
            if (!currentUser || targetUid !== currentUser.uid) return;

            const saveBtn = document.getElementById('save_btn');
            saveBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin me-2"></i>Saving...`;
            saveBtn.disabled = true;

            const fullName = document.getElementById('name').value;
            const firstName = document.getElementById('first_name').value;
            const lastName = document.getElementById('last_name').value;
            const telegram = document.getElementById('telegram_username_id').value;
            const examYear = document.getElementById('id_exam_year').value;
            const avatarSrc = document.getElementById('avatar_img').src;

            try {
                // 1. Firebase Authentication Profile එක අප්ඩේට් කිරීම
                await updateProfile(currentUser, { displayName: fullName });

                // 2. Firebase Firestore Database එකට සේව් කිරීම
                await setDoc(doc(db, "students", currentUser.uid), {
                    uid: currentUser.uid,
                    fullName: fullName,
                    email: currentUser.email,
                    firstName: firstName,
                    lastName: lastName,
                    telegram: telegram,
                    examYear: examYear,
                    avatar: avatarSrc,
                    updatedAt: new Date().toISOString()
                }, { merge: true });

                // LocalStorage එකත් අප්ඩේට් කිරීම
                localStorage.setItem('student_name', fullName);
                localStorage.setItem('student_email', currentUser.email);
                localStorage.setItem('student_first_name', firstName);
                localStorage.setItem('student_last_name', lastName);
                localStorage.setItem('student_telegram', telegram);
                localStorage.setItem('student_exam_year', examYear);
                localStorage.setItem('student_avatar', avatarSrc);

                document.getElementById('display_full_name').innerText = fullName;
                window.dispatchEvent(new Event('storage'));

                // Success Alert එක
                Swal.fire({
                    icon: 'success',
                    title: 'Data Synchronized!',
                    text: 'ඔබගේ තොරතුරු සාර්ථකව සුරැකිනු ලැබුවා!',
                    background: '#161b22',
                    color: '#ffffff',
                    confirmButtonColor: '#00d2ff'
                });

            } catch (error) {
                console.error(error);
                Swal.fire({
                    icon: 'error',
                    title: 'Error!',
                    text: 'දත්ත සුරැකීමේදී ගැටලුවක් ඇතිවිය: ' + error.message,
                    background: '#161b22',
                    color: '#ffffff'
                });
            } finally {
                saveBtn.innerHTML = `<i class="fa-solid fa-floppy-disk me-2"></i>Save Info`;
                saveBtn.disabled = false;
            }
        };

        // 📷 Avatar Preview Function
        window.previewAndSaveAvatar = function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('avatar_img').src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        };

        // 🚪 Logout Handler
        const handleLogout = () => {
            Swal.fire({
                title: 'Quit Game?',
                text: "ඔබට පද්ධතියෙන් ඉවත් වීමට අවශ්‍යද?",
                icon: 'warning',
                showCancelButton: true,
                background: '#161b22',
                color: '#ffffff',
                confirmButtonColor: '#ff3d00',
                cancelButtonColor: '#30363d',
                confirmButtonText: 'Yes, Exit!'
            }).then((result) => {
                if (result.isConfirmed) {
                    signOut(auth).then(() => {
                        localStorage.clear();
                        window.location.href = 'index.html';
                    });
                }
            });
        };

        document.getElementById('nav_logout_btn').addEventListener('click', handleLogout);
        document.getElementById('card_logout_btn').addEventListener('click', handleLogout);
        // 🛡️ Right-Click බ්ලොක් කිරීම
document.addEventListener('contextmenu', event => event.preventDefault());

// 🛡️ Keyboard Shortcuts (F12, Ctrl+U, Ctrl+Shift+I, Ctrl+Shift+J) බ්ලොක් කිරීම
document.addEventListener('keydown', function (e) {
    // F12 බ්ලොක් කිරීම
    if (e.key === "F12") {
        e.preventDefault();
        return false;
    }
    // Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U, Ctrl+Shift+C බ්ලොක් කිරීම
    if (e.ctrlKey && (e.key === 'u' || e.key === 'U' || e.shiftKey && (e.key === 'i' || e.key === 'I' || e.key === 'j' || e.key === 'J' || e.key === 'c' || e.key === 'C'))) {
        e.preventDefault();
        return false;
    }
});
    </script>

    <script src="https://cdn.cmwithmn.lk/web-data/Static/assets/bootstrap/js/bootstrap.min.js"></script>
    <script src="https://cdn.cmwithmn.lk/web-data/Static/assets/js/libs/tgs-player.js"></script>
</body>
